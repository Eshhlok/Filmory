services:
  - type: web
    name: movie-recommender-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Supabase connection string in Render dashboard
      - key: TMDB_API_KEY
        sync: false          # paste your TMDB key in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0